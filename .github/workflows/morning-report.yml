name: 美股 Morning Report

on:
  schedule:
    - cron: '0 * * * 1-5'
  workflow_dispatch:
  repository_dispatch:
    types: [morning-report]

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Check time (08:00 Beijing +/- tolerance)
        id: check_time
        run: |
          HOUR=$(TZ='Asia/Shanghai' date +%H)
          echo "Beijing time: $(TZ='Asia/Shanghai' date '+%H:%M')"
          # GitHub Actions free-tier cron can be delayed 10-40 min
          # Accept any trigger within 08:xx hour (cron trigger is once/hour)
          if [ "$HOUR" = "08" ]; then
            echo "Proceeding at 08:00 Beijing"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping - HOUR=$HOUR, not 08:00 Beijing"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check_time.outputs.should_run == 'true'

      - uses: actions/setup-node@v4
        if: steps.check_time.outputs.should_run == 'true'
        with:
          node-version: '22'

      - name: Run morning report
        if: steps.check_time.outputs.should_run == 'true'
        run: node scripts/generate-report.mjs
        env:
          SCT_KEY: ${{ secrets.SCT_KEY }}

      - name: Skipped notification
        if: steps.check_time.outputs.should_run != 'true'
        run: echo "Skipped - triggered at $(TZ='Asia/Shanghai' date '+%H:%M') Beijing time"