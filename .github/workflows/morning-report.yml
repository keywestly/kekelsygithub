name: 美股 Morning Report

on:
  schedule:
    - cron: '0 * * * 2-6'
  workflow_dispatch:
  repository_dispatch:
    types: [morning-report]

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Check time
        id: check_time
        env:
          GHA_EVENT: ${{ github.event_name }}
        run: |
          HOUR=$(TZ='Asia/Shanghai' date +%H)
          MIN=$(TZ='Asia/Shanghai' date +%M)
          echo "Beijing time: $HOUR:$MIN"
          echo "GitHub event: $GHA_EVENT"
          # Manual trigger: always proceed
          if [ "$GHA_EVENT" = "workflow_dispatch" ] || [ "$GHA_EVENT" = "repository_dispatch" ]; then
            echo "Manual trigger - proceeding"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "$HOUR" = "08" ] || [ "$HOUR" = "09" ]; then
            echo "Scheduled at $HOUR:xx Beijing - proceeding"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping - HOUR=$HOUR not in 08-09 window"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check_time.outputs.should_run == 'true'

      - uses: actions/setup-node@v4
        if: steps.check_time.outputs.should_run == 'true'
        with:
          node-version: '22'

      - name: Run morning report
        if: steps.check_time.outputs.should_run == 'true'
        run: node scripts/generate-report.mjs
        env:
          SCT_KEY: ${{ secrets.SCT_KEY }}

      - name: Skipped notification
        if: steps.check_time.outputs.should_run != 'true'
        run: echo "Skipped - triggered at $(TZ='Asia/Shanghai' date '+%H:%M') Beijing time"