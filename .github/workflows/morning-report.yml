name: Morning Report

on:
  schedule:
    - cron: "0 9 * * 1-5"
    - cron: "0 10 * * 1-5"
    - cron: "0 11 * * 1-5"
    - cron: "0 12 * * 1-5"
    - cron: "0 13 * * 1-5"
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_run:
        description: "Skip holiday check"
        default: "false"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Generate and push
        run: node scripts/generate-report.mjs
        env:
          SCT_KEY: ${{ secrets.SCT_KEY }}
